[package]
name = "gm65-scanner"
version = "0.1.0"
edition = "2021"
description = "UART driver for GM65/M3Y QR barcode scanner modules"
license = "MIT OR Apache-2.0"
repository = "https://github.com/Amperstrand/gm65-scanner"
keywords = ["qr", "barcode", "scanner", "gm65", "m3y", "uart", "embedded", "no-std"]
categories = ["embedded", "hardware-support", "no-std"]
readme = "README.md"
exclude = ["/examples", "/.github"]

[features]
default = []
embedded-hal = ["dep:embedded-hal", "dep:embedded-hal-async"]
std = []

[dependencies]
embedded-hal = { version = "1.0", optional = true }
embedded-hal-async = { version = "1.0", optional = true }

[dev-dependencies]
embedded-hal-mock = "0.10"

[package.metadata.docs.rs]
all-features = true
