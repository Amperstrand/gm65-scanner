name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test -p gm65-scanner --lib

  check-features:
    name: Check Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check sync (default)
        run: cargo check -p gm65-scanner
      - name: Check async
        run: cargo check -p gm65-scanner --features async
      - name: Check defmt
        run: cargo check -p gm65-scanner --features defmt
      - name: Check async + defmt
        run: cargo check -p gm65-scanner --features async,defmt
      - name: Check std
        run: cargo check -p gm65-scanner --features std
      - name: Check all features
        run: cargo check -p gm65-scanner --all-features

  cross-compile:
    name: Cross-compile (ARM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Build sync firmware
        run: cargo build --release --target thumbv7em-none-eabihf -p stm32f469i-disco-scanner --features sync-mode,defmt
      - name: Build async firmware
        run: cargo build --release --target thumbv7em-none-eabihf -p stm32f469i-disco-scanner --features scanner-async,defmt
      - name: Build sync HIL test
        run: cargo build --release --target thumbv7em-none-eabihf -p stm32f469i-disco-scanner --bin hil_test_sync --features sync-mode,defmt
      - name: Build async HIL test
        run: cargo build --release --target thumbv7em-none-eabihf -p stm32f469i-disco-scanner --bin hil_test_async --features scanner-async,defmt

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (sync, default)
        run: cargo clippy -p gm65-scanner -- -D warnings
      - name: Clippy (async)
        run: cargo clippy -p gm65-scanner --features async -- -D warnings
      - name: Clippy (async + defmt)
        run: cargo clippy -p gm65-scanner --features async,defmt -- -D warnings
      - name: Clippy (std)
        run: cargo clippy -p gm65-scanner --features std -- -D warnings

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify manifest
        run: |
          cd crates/gm65-scanner
          cargo check --all-features
          echo "NOTE: Full publish dry-run cannot run in this workspace because the"
          echo "example firmware pins embassy to a git rev that conflicts with"
          echo "crates.io embassy-time versions. Publish from an isolated environment."
