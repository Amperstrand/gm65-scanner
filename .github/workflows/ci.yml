name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test -p gm65-scanner --lib

  check-features:
    name: Check Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check sync (default)
        run: cargo check -p gm65-scanner
      - name: Check async
        run: cargo check -p gm65-scanner --features async
      - name: Check defmt
        run: cargo check -p gm65-scanner --features defmt
      - name: Check async + defmt
        run: cargo check -p gm65-scanner --features async,defmt
      - name: Check std
        run: cargo check -p gm65-scanner --features std
      - name: Check all features
        run: cargo check -p gm65-scanner --all-features

  cross-compile:
    name: Cross-compile (ARM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Build sync firmware
        run: cargo build --release --target thumbv7em-none-eabihf -p stm32f469i-disco-scanner --bin stm32f469i-disco-scanner --features sync-mode,defmt
      - name: Build async firmware
        run: cargo build --release --target thumbv7em-none-eabihf -p stm32f469i-disco-scanner --bin async_firmware --no-default-features --features scanner-async,defmt
      - name: Build sync HIL test
        run: cargo build --release --target thumbv7em-none-eabihf -p stm32f469i-disco-scanner --bin hil_test_sync --features sync-mode,defmt
      - name: Build async HIL test
        run: cargo build --release --target thumbv7em-none-eabihf -p stm32f469i-disco-scanner --bin hil_test_async --no-default-features --features scanner-async,defmt

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (sync, default)
        run: cargo clippy -p gm65-scanner -- -D warnings
      - name: Clippy (async)
        run: cargo clippy -p gm65-scanner --features async -- -D warnings
      - name: Clippy (async + defmt)
        run: cargo clippy -p gm65-scanner --features async,defmt -- -D warnings
      - name: Clippy (std)
        run: cargo clippy -p gm65-scanner --features std -- -D warnings
      - name: Clippy (sync firmware)
        run: cargo clippy -p stm32f469i-disco-scanner --features sync-mode,defmt --target thumbv7em-none-eabihf -- -D warnings
      - name: Clippy (async firmware)
        run: cargo clippy -p stm32f469i-disco-scanner --no-default-features --features scanner-async,defmt --target thumbv7em-none-eabihf -- -D warnings

  publish-dry-run:
    name: Publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify manifest
        run: |
          cd crates/gm65-scanner
          cargo check --all-features
          echo "NOTE: Full publish dry-run cannot run in this workspace because the"
          echo "example firmware pins embassy to a git rev that conflicts with"
          echo "crates.io embassy-time versions. Publish from an isolated environment."

  on-device-tests:
    name: On-device tests required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Check test report exists
        id: check_report
        run: |
          if [ ! -f .test-report.json ]; then
            echo "::error::On-device test report (.test-report.json) not found."
            echo ""
            echo "Before merging to main, you must run on-device tests:"
            echo "  python3 scripts/test_on_device.py sync"
            echo ""
            echo "This generates .test-report.json. Commit it with your PR."
            echo "See scripts/test_on_device.py --help for options."
            echo ""
            echo "Note: Only sync firmware tests are required for merge."
            echo "Async firmware tests are optional (experimental embassy support)."
            exit 1
          fi
      - name: Validate test report
        if: steps.check_report.outcome == 'success'
        run: |
          REPORT=$(cat .test-report.json)
          ALL_PASSED=$(echo "$REPORT" | python3 -c "import json,sys; print(json.load(sys.stdin)['all_passed'])")
          TIMESTAMP=$(echo "$REPORT" | python3 -c "import json,sys; print(json.load(sys.stdin)['timestamp'])")
          PASSED=$(echo "$REPORT" | python3 -c "import json,sys; print(json.load(sys.stdin)['passed'])")
          FAILED=$(echo "$REPORT" | python3 -c "import json,sys; print(json.load(sys.stdin)['failed'])")

          echo "Test report timestamp: $TIMESTAMP"
          echo "Results: $PASSED passed, $FAILED failed"

          if [ "$ALL_PASSED" != "True" ]; then
            echo "::error::On-device tests FAILED ($PASSED passed, $FAILED failed). Fix all failures before merging."
            exit 1
          fi

          # Check report is not stale (>7 days old)
          REPORT_AGE_DAYS=$(( ( $(date +%s) - $(date -d "$TIMESTAMP" +%s) ) / 86400 ))
          if [ "$REPORT_AGE_DAYS" -gt 7 ]; then
            echo "::warning::Test report is $REPORT_AGE_DAYS days old. Consider re-running tests."
          fi

          echo "On-device tests verified."
