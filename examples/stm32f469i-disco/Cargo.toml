[package]
name = "stm32f469i-disco-scanner"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["sync-mode", "defmt"]
sync-mode = ["gm65-scanner/sync", "gm65-scanner/hil-tests"]
async-mode = ["gm65-scanner/async", "gm65-scanner/hil-tests", "dep:embassy-executor", "dep:embassy-stm32", "dep:embassy-time"]
defmt = ["dep:defmt", "dep:defmt-rtt", "dep:panic-probe", "gm65-scanner/defmt", "stm32f469i-disc/defmt"]

[dependencies]
cortex-m = { workspace = true }
cortex-m-rt = { workspace = true }
defmt = { workspace = true, optional = true }
defmt-rtt = { workspace = true, optional = true }
panic-probe = { workspace = true, optional = true }
embedded-hal = { workspace = true }
embedded-hal-02 = { workspace = true }
embedded-graphics = { workspace = true }
heapless = { workspace = true }
linked_list_allocator = { workspace = true }
nb = { workspace = true }
static_cell = { workspace = true }
usb-device = { workspace = true }
usbd-serial = { workspace = true }
usbd-hid = { workspace = true }
qrcodegen-no-heap = { workspace = true }
gm65-scanner = { workspace = true }
stm32f469i-disc = { workspace = true, features = ["usb_fs", "framebuffer"] }

embassy-executor = { git = "https://github.com/embassy-rs/embassy", package = "embassy-executor", features = ["platform-cortex-m", "executor-thread", "defmt"], optional = true }
embassy-stm32 = { git = "https://github.com/embassy-rs/embassy", package = "embassy-stm32", features = ["stm32f469zg", "time-driver-any", "exti", "defmt", "single-bank"], optional = true }
embassy-time = { git = "https://github.com/embassy-rs/embassy", package = "embassy-time", features = ["defmt"], optional = true }
